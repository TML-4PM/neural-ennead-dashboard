<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neural Ennead — Live Command Centre</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { background: linear-gradient(135deg, #1a0033, #000000); color: white; }</style>
</head>
<body class="min-h-screen p-8">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-5xl font-bold mb-2">🧠 Neural Ennead Live Command Centre</h1>
    <p class="text-emerald-400 text-xl mb-8">727 Agents • 4 Sites • Real-time Excess Monetisation</p>

    <div class="grid grid-cols-4 gap-6 mb-10" id="metrics"></div>

    <div class="bg-white/10 p-8 rounded-3xl mb-8">
      <h2 class="text-2xl mb-6">Live Agent Activity</h2>
      <table class="w-full text-left" id="table"></table>
    </div>

    <button onclick="sellExcess()" class="bg-emerald-500 hover:bg-emerald-600 text-black font-bold text-2xl px-12 py-6 rounded-3xl w-full">
      💰 SELL ALL EXCESS RIGHT NOW — Turn into resale credits
    </button>
  </div>

  <script>
    fetch('data.json').then(r => r.json()).then(data => {
      document.getElementById("metrics").innerHTML = `
        <div class="bg-white/10 p-6 rounded-2xl"><div class="text-4xl font-bold">${data.total_agents}</div><div class="text-sm text-gray-400">Total Agents</div></div>
        <div class="bg-white/10 p-6 rounded-2xl"><div class="text-4xl font-bold text-emerald-400">${data.active_agents}</div><div class="text-sm text-gray-400">Active Now</div></div>
        <div class="bg-white/10 p-6 rounded-2xl"><div class="text-4xl font-bold text-yellow-400">$${data.excess_harvested}</div><div class="text-sm text-gray-400">Excess Harvested</div></div>
        <div class="bg-white/10 p-6 rounded-2xl"><div class="text-4xl font-bold">100%</div><div class="text-sm text-gray-400">Capacity Available</div></div>
      `;

      let html = `<thead><tr class="text-gray-400"><th class="pb-4">Agent ID</th><th class="pb-4">Name</th><th class="pb-4">Role</th><th class="pb-4">Utilization</th><th class="pb-4">Excess $</th></tr></thead><tbody>`;
      data.agents.forEach(a => {
        const load = data.active_load[a.ID] || 0;
        const excess = (load * 60 * 0.008).toFixed(2);
        html += `<tr class="border-t border-white/10"><td class="py-4">${a.ID}</td><td class="py-4">${a.Name}</td><td class="py-4">${a.Role}</td><td class="py-4">${load} min</td><td class="py-4 text-emerald-400">$${excess}</td></tr>`;
      });
      html += `</tbody>`;
      document.getElementById("table").innerHTML = html;
    });

    function sellExcess() {
      alert("✅ Excess sold! Credits auto-applied to next job.");
    }
  </script>
</body>
</html>
