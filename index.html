<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neural Ennead Command Centre</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
<div class="max-w-7xl mx-auto p-8">
  <h1 class="text-5xl font-bold mb-1">Neural Ennead Command Centre</h1>
  <p class="text-emerald-400 text-xl">10,000 Agents • 9 VP Bundles • Live from Temporal + Supabase</p>

  <!-- Metrics -->
  <div class="grid grid-cols-4 gap-6 mt-10">
    <div class="bg-zinc-900 p-8 rounded-3xl text-center"><div class="text-7xl font-bold">10,000</div><div class="text-sm text-zinc-400">Total Agents</div></div>
    <div class="bg-zinc-900 p-8 rounded-3xl text-center"><div class="text-7xl font-bold text-emerald-400">142</div><div class="text-sm text-zinc-400">Active Now</div></div>
    <div class="bg-zinc-900 p-8 rounded-3xl text-center"><div class="text-7xl font-bold text-yellow-400">$1,284</div><div class="text-sm text-zinc-400">Excess Today</div></div>
    <div class="bg-zinc-900 p-8 rounded-3xl text-center"><div class="text-7xl font-bold">100%</div><div class="text-sm text-zinc-400">Capacity</div></div>
  </div>

  <!-- Search -->
  <input id="search" placeholder="Search agents or bundles..." class="w-full mt-10 bg-zinc-900 border border-zinc-700 rounded-2xl p-5 text-lg">

  <!-- Tabs -->
  <div class="flex gap-4 mt-8 border-b border-zinc-800 pb-2">
    <button onclick="switchTab(0)" class="tab active px-6 py-3 border-b-2 border-emerald-400">Overview</button>
    <button onclick="switchTab(1)" class="tab px-6 py-3">Popular & Up-and-Coming</button>
    <button onclick="switchTab(2)" class="tab px-6 py-3">Breaking Agents</button>
    <button onclick="switchTab(3)" class="tab px-6 py-3">Customer View</button>
    <button onclick="switchTab(4)" class="tab px-6 py-3">Transport Layer Live</button>
  </div>

  <!-- Tiny Sell Excess button -->
  <button onclick="sellExcess()" class="fixed top-8 right-8 bg-emerald-500 hover:bg-emerald-600 px-5 py-2 rounded-2xl text-sm font-medium flex items-center gap-2">
    💰 Sell Excess ($1,284)
  </button>
</div>

<script>
function switchTab(n) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.getElementById('tab'+n).classList.remove('hidden');
}
function sellExcess() { alert('✅ Excess sold! Credits applied automatically via Performance Analyst.'); }
</script>
</body>
</html>
